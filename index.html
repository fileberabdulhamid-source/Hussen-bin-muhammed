<!DOCTYPE html>
<html lang="om">
<head>
  <meta charset="UTF-8">
  <title>Hussen bin Muhammed</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #1e3c72, #2a5298);
      color: white;
      text-align: center;
    }

    .container {
      margin-top: 80px;
    }

    .card {
      background: rgba(0,0,0,0.4);
      padding: 30px;
      width: 300px;
      margin: auto;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .strong {
      font-size: 18px;
      color: #00ffcc;
      font-weight: bold;
    }

    .btn {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #00ffcc;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    .btn:hover {
      background: white;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="card">
      <h1>Hussen bin Muhammed</h1>
      <p class="strong">💪 Nama Cimaa (Strong Man)</p>
      <p>Namni kun jabaa, humna guddaa fi ofitti amanamummaa qaba.</p>
      <button class="btn" onclick="alert('Hussen bin Muhammed: Nama cimaa dhugaa! 💪')">
        Dabalata Ilaali
      </button>
    </div>
  </div>

</body>
</html>
